<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CK-ERROR | Register</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>CK-ERROR</h1>
<p>Create Your Account</p>

<form id="registerForm">

<input
type="text"
id="username"
placeholder="Username"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">
CREATE ACCOUNT
</button>

</form>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script src="js/register.js"></script>

</body>
</html>
