<!DOCTYPE html>

<html>

<head>

<title>Create Ticket</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<h1>Create Support Ticket</h1>

<form id="ticketForm">

<input
type="text"
id="subject"
placeholder="Subject"
required>

<input
type="text"
id="platform"
placeholder="Platform"
required>

<textarea
id="message"
placeholder="Describe your issue"
required></textarea>

<button>
Submit Ticket
</button>

</form>

</div>

<script src="js/ticket.js"></script>

</body>

  </html>
